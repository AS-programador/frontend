<script>
 const uploadForm = document.getElementById('uploadForm');
 const statusText = document.getElementById('status');


 var fileInput = document.getElementById('fileInput');

 const Upload_page = document.getElementById("Upload_page");
 const Picture_page = document.getElementById("Picture_page");
 const Analysis_page = document.getElementById("Analysis_page");

 const Moveto_Upload = document.getElementById("Moveto_Upload");
 const Moveto_Picture = document.getElementById("Moveto_Picture");
 const Moveto_Analysis = document.getElementById("Moveto_Analysis");
 const Moveto_Analysis2 = document.getElementById("Moveto_Analysis2");








 Moveto_Upload.addEventListener("click", function Upload_Page() {
   ClearTabs();
   Upload_page.style.visibility = "visible";
   Upload_page.style.display = "block";
   //document.body.style.backgroundColor = "#E0D0F0";
 });
 Moveto_Picture.addEventListener("click", function Picture_Page() {
   ClearTabs();
   Picture_page.style.visibility = "visible";
   Picture_page.style.display = "block";
   //document.body.style.backgroundColor = "#E0D0F0";
 });
 Moveto_Analysis.addEventListener("click", function Analysis_Page() {

 });
 Moveto_Analysis2.addEventListener("click", function Analysis_Page2() {

 });
 Moveto_Home.addEventListener("click", function Home_Page() {

   Home_page.style.visibility = "visible";
   Home_page.style.display = "block";
   //document.body.style.backgroundColor = "#DDDDFF";
 });




 function ClearTabs() {
  Home_page.style.visibility = "hidden";
  Home_page.style.display = "none";
  Upload_page.style.visibility = "hidden";
  Upload_page.style.display = "none";
  Picture_page.style.visibility = "hidden";
  Picture_page.style.display = "none";
  Analysis_page.style.visibility = "hidden";
  Analysis_page.style.display = "none";
 }




 uploadForm.addEventListener('submit', function(event) {
   event.preventDefault();
   const results = document.getElementById('results');
   if (fileInput.files.length > 0) {
     const fileName = fileInput.files[0].name;
     statusText.style.color = "green";
     statusText.innerText = "Success! " + fileName + " has been selected.";
     results.style.visibility = "visible";
     results.style.display = "block";
     //How did I get here? I don't even like ai.
   } else {
     statusText.style.color = "red";
     statusText.innerText = "Please select a file first.";
   }
 });


 const stopCam = () => {
   const video = document.getElementById('video');
   const stream = video.srcObject;
   const tracks = stream.getTracks();
   tracks.forEach(track => track.stop());
   video.srcObject = null;
 };


 const startCam = () => {
   const video = document.getElementById('video');
   if (navigator.mediaDevices.getUserMedia) {
   navigator.mediaDevices.getUserMedia({ video: true })
     .then(stream => {
       video.srcObject = stream;
     })
     .catch(error => {
       console.error("Something went wrong!", error);
     });
   } else {
     console.log("getUserMedia not supported on your browser!");
   }
 };


 $(document).ready(() => {
   startCam();
 });
</script>
